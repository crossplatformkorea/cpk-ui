name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install modules
        run: bun install --frozen-lockfile

      - name: Check peer dependencies
        run: bun run check-peer-deps

      - name: Check component regression coverage
        run: bun run components:check

      - name: Check Storybook coverage
        run: bun run storybook:check

      - name: Check linting
        run: bun run lint

      - name: Build typescript
        run: bun run tsc

      - name: Build
        run: bun run build

      - name: Test
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: bunx jest --coverage --forceExit --silent --ci

      - name: E2E smoke test
        run: bun run e2e-smoke

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
