name: Storybook on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: storybook-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          check-latest: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install packages
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run storybook:build

      - name: Deploy to firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CROSS_PLATFORM_KOREA_5032F }}
          projectId: cross-platform-korea-5032f
          target: cpk-ui
          expires: 7d
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
