name: Storybook on merge

on:
  push:
    branches:
      - main

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install packages
        run: bun install --frozen-lockfile

      - name: Check Storybook coverage
        run: bun run storybook:check

      - name: Build Storybook
        run: bun run storybook:build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CROSS_PLATFORM_KOREA_5032F }}
          channelId: live
          projectId: cross-platform-korea-5032f
          target: cpk-ui
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
