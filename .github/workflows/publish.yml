name: publish-package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag
        required: true
        type: choice
        default: beta
        options:
          - beta
          - latest
      dry_run:
        description: Validate package contents without publishing
        required: false
        type: boolean
        default: true

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release checks
        run: |
          bun run test:all
          bun run build
          bun run e2e-smoke

      - name: Read and validate version
        id: version
        run: |
          VERSION=$(node -p "require('./lib/package.json').version")
          if [ "${{ inputs.tag }}" = "beta" ]; then
            node -e "if (!/-beta\\.\\d+$/.test(process.argv[1])) process.exit(1)" "$VERSION"
          else
            node -e "if (process.argv[1].includes('-')) process.exit(1)" "$VERSION"
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm version availability
        if: ${{ !inputs.dry_run }}
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "cpk-ui@$VERSION" version >/dev/null 2>&1; then
            echo "cpk-ui@$VERSION is already published"
            exit 1
          fi

      - name: Ensure npm supports trusted publishing
        run: |
          npm install --global npm@11.18.0
          npm --version

      - name: Validate package tarball
        working-directory: lib
        run: npm publish --dry-run --access public --tag "${{ inputs.tag }}"

      - name: Publish package
        if: ${{ !inputs.dry_run }}
        working-directory: lib
        run: npm publish --access public --tag "${{ inputs.tag }}" --provenance

      - name: Tag release
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: ${{ inputs.tag != 'latest' }}
          generate_release_notes: true
